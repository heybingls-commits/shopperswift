name: Build iOS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: |
          xcodebuild \
            -project ShopperSwift.xcodeproj \
            -scheme ShopperSwift \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            SYMROOT="$(PWD)/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build
      - run: |
          mkdir -p out/Payload
          cp -R build/Release-iphoneos/ShopperSwift.app out/Payload/
          cd out && zip -r ../Shopper.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ShopperApp
          path: Shopper.ipa
          retention-days: 30
